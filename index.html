<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ailsa — AI Life Coach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ede7dd;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    #chat-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 500px;
      border-radius: 20px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }

    #chat-header {
      padding: 14px 18px;
      background: #faf8f5;
      border-bottom: 1px solid #ede9e3;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #avatar-wrap {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: #e8e0d5;
    }

    #avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    #header-text h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    #header-text p {
      font-size: 11px;
      color: #999;
      margin-top: 1px;
    }

    #status-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF82;
    }

    #status-label {
      font-size: 11px;
      color: #4CAF82;
      font-weight: 500;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      max-width: 88%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: #e8e0d5;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      color: #1a1a1a;
    }

    .msg.coach .bubble {
      background: #f7f5f2;
      border-bottom-left-radius: 4px;
    }

    .msg.user .bubble {
      background: #daeaf5;
      color: #2c4a5a;
      border-bottom-right-radius: 4px;
    }

    #chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      flex-shrink: 0;
    }

    .chip {
      font-size: 12px;
      padding: 6px 13px;
      border-radius: 20px;
      border: 1px solid #ddd;
      cursor: pointer;
      color: #555;
      background: #99BFCD;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .chip:hover {
      background: #daeaf5;
      border-color: #7ab3d0;
      color: #2c4a5a;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #ede9e3;
      background: #faf8f5;
      flex-shrink: 0;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 22px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
      resize: none;
      font-family: inherit;
      outline: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: #7ab3d0; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #7ab3d0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: #5a9ab8; }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { background: #ddd; cursor: not-allowed; }

    .typing-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 11px 15px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #bbb;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    #powered {
      text-align: center;
      font-size: 10px;
      color: #ccc;
      padding: 6px 0 10px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    @media (max-width: 500px) {
      body { padding: 0; background: #fff; }
      #chat-wrap {
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
<div id="chat-wrap">

  <div id="chat-header">
    <div id="avatar-wrap">
      <img src="ailsa.jpg" alt="Ailsa" />
    </div>
    <div id="header-text">
      <h2>Ailsa</h2>
      <p>AI Life Coach</p>
    </div>
    <div id="status-wrap">
      <div id="status-dot"></div>
      <span id="status-label">Online</span>
    </div>
  </div>

  <div id="messages">
    <div class="msg coach">
      <div class="msg-avatar">
        <img src="ailsa.jpg" alt="Ailsa" />
      </div>
      <div class="bubble">Hi, I'm <strong>Ailsa</strong> — I'm glad you're here. Whether you're feeling stuck, seeking direction, ready to make a change, or just need to offload, I'm here to support you. Where would you like to start?</div>
    </div>
  </div>

  <div id="chips">
    <button class="chip" onclick="sendChip(this)">I Feel Dysregulated</button>
    <button class="chip" onclick="sendChip(this)">I'm Anxious</button>
    <button class="chip" onclick="sendChip(this)">Help Me Offload</button>
    <button class="chip" onclick="sendChip(this)">I Feel Stuck</button>
  </div>

  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Talk to Ailsa..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14 8L2 2l3 6-3 6 12-6z" fill="white"/>
      </svg>
    </button>
  </div>

  <div id="powered">Ailsa &bull; AI Life Coach</div>

</div>

<script>
  let history = [];

  async function callAilsa(userMsg) {
    history.push({ role: "user", content: userMsg });

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const reply = data.reply || "I'm here for you. Could you tell me more?";
    history.push({ role: "assistant", content: reply });
    return reply;
  }

  function avatarHTML() {
    return `<div class="msg-avatar"><img src="ailsa.jpg" alt="Ailsa" /></div>`;
  }

  function addMsg(text, role) {
    const msgs = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    if (role === "coach") {
      wrap.innerHTML = `${avatarHTML()}<div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
    } else {
      wrap.innerHTML = `<div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
    }
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg coach";
    wrap.id = "typing-indicator";
    wrap.innerHTML = `${avatarHTML()}<div class="bubble"><div class="typing-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  async function sendMessage(text) {
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const chips = document.getElementById("chips");
    const msg = text || input.value.trim();
    if (!msg) return;

    input.value = "";
    input.style.height = "auto";
    chips.style.display = "none";
    addMsg(msg, "user");
    btn.disabled = true;
    showTyping();

    try {
      const reply = await callAilsa(msg);
      removeTyping();
      addMsg(reply, "coach");
    } catch (e) {
      removeTyping();
      addMsg("Something went wrong. Please try again in a moment.", "coach");
    }

    btn.disabled = false;
    input.focus();
  }

  function sendChip(el) { sendMessage(el.textContent); }

  const input = document.getElementById("user-input");
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
